name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build runtime Drive config
        env:
          DRIVE_FOLDER_ID: 1nNtCyrJ0uWSMmQwcOMhr6eYDV6vmVmRn
          GOOGLE_API_KEY: ${{ vars.GOOGLE_API_KEY || secrets.GOOGLE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_UPLOAD_FOLDER_ID: ${{ vars.GOOGLE_UPLOAD_FOLDER_ID }}
          GOOGLE_UPLOAD_FOLDER_NAME: Upload
        run: node scripts/write-drive-config.mjs
      - name: Publish main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drive-config.js
          git commit -m "chore: build pages config" || true
          git push origin HEAD:gh-pages --force
